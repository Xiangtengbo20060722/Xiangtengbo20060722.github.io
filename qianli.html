<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>千里江山图 · 小汽车</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: "楷体", "华文楷书", serif; }
        #info {
            position: absolute; bottom: 20px; left: 20px;
            color: #e8dbaa; background: rgba(0,0,0,0.5);
            padding: 6px 15px; border-radius: 20px;
            font-size: 12px; pointer-events: none; z-index: 10;
            backdrop-filter: blur(4px);
        }
        #title {
            position: absolute; top: 20px; left: 0; right: 0;
            text-align: center; color: #f5e2b0;
            font-size: 18px; pointer-events: none; z-index: 10;
            text-shadow: 1px 1px 2px #1a3a2a;
            letter-spacing: 4px;
        }
        .reset-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.6); color: #e8dbaa;
            border: 1px solid #c9ae5d; padding: 5px 12px;
            border-radius: 20px; font-size: 11px; cursor: pointer;
            z-index: 20; font-family: inherit;
        }
        .reset-btn:hover { background: #5f7a4e; }
    </style>
</head>
<body>
    <div id="title">🏔️ 千里江山图 · 青绿行 🚗</div>
    <div id="info">🐉 小汽车穿行宋代山水画卷 | 拖拽旋转视角</div>
    <div class="reset-btn" id="resetBtn">⟳ 重置视角</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 场景：仿古绢本底色 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd2c28b);
        scene.fog = new THREE.FogExp2(0xd2c28b, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.3, 50);
        camera.position.set(6, 4, 8);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.target.set(0, 1.2, 0);
        
        document.getElementById('resetBtn').onclick = () => {
            camera.position.set(6, 4, 8);
            controls.target.set(0, 1.2, 0);
            controls.update();
        };

        // --- 灯光：营造青绿山水的雅致光影 ---
        const ambient = new THREE.AmbientLight(0xc6b67a, 0.65);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xfff0cf, 1.1);
        mainLight.position.set(5, 8, 4);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x8aac7a, 0.45);
        fillLight.position.set(0, 1, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x7c9a6e, 0.4);
        backLight.position.set(-3, 2, -4);
        scene.add(backLight);

        // --- 千里江山图风格纹理 (青绿渐变 + 皴法笔触)---
        const createScrollTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            // 石绿基底
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#3f6e48');
            grad.addColorStop(0.4, '#6a9c6e');
            grad.addColorStop(0.7, '#98be8a');
            grad.addColorStop(1, '#c7dea5');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // 石青皴点
            for (let i = 0; i < 2000; i++) {
                ctx.fillStyle = `rgba(58, 88, 68, ${Math.random() * 0.4})`;
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 4 + 1, 0, Math.PI * 2);
                ctx.fill();
            }
            // 金粉苔点
            for (let i = 0; i < 800; i++) {
                ctx.fillStyle = `rgba(210, 180, 90, ${Math.random() * 0.5})`;
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
            // 皴法笔触
            ctx.lineWidth = 1;
            for (let i = 0; i < 1500; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.strokeStyle = `rgba(70, 55, 35, 0.3)`;
                ctx.stroke();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(2, 2);
            return tex;
        };

        const mountainTexture = createScrollTexture();

        // --- 层峦叠嶂的地形 (千里江山标志性山势)---
        const width = 28, depth = 32, seg = 140;
        const geometry = new THREE.PlaneGeometry(width, depth, seg, seg);
        geometry.rotateX(-Math.PI / 2);
        const positions = geometry.attributes.position.array;
        
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const z = positions[i + 2];
            let y = 0;
            // 主峰群
            y += Math.max(0, 1.3 - Math.hypot(x - 1.2, z - 1.8) / 2.2) * 1.2;
            y += Math.max(0, 1.0 - Math.hypot(x + 2.5, z - 0.5) / 2.4) * 1.0;
            y += Math.max(0, 0.9 - Math.hypot(x - 2, z + 2) / 2.3) * 0.9;
            y += Math.max(0, 0.7 - Math.hypot(x + 1, z + 3) / 2.5) * 0.8;
            // 山脉起伏
            y += Math.sin(x * 0.6) * Math.cos(z * 0.5) * 0.35;
            y += Math.sin(x * 1.4) * Math.sin(z * 1.3) * 0.2;
            // 边缘衰减
            const edgeFactor = 1 - Math.max(0, (Math.abs(x) - 10) / 6) * 0.5;
            const edgeZ = 1 - Math.max(0, (Math.abs(z) - 12) / 7) * 0.5;
            positions[i + 1] = y * Math.min(edgeFactor, edgeZ);
        }
        geometry.computeVertexNormals();
        
        const terrainMat = new THREE.MeshStandardMaterial({
            map: mountainTexture,
            color: 0xffffff,
            roughness: 0.6,
            metalness: 0.05,
            emissive: 0x2a442a,
            emissiveIntensity: 0.08
        });
        const terrain = new THREE.Mesh(geometry, terrainMat);
        terrain.receiveShadow = true;
        terrain.castShadow = true;
        scene.add(terrain);

        // 点缀独立山峰 (增强千里江山层次)
        const addPeak = (x, z, h, color) => {
            const peak = new THREE.Mesh(new THREE.ConeGeometry(0.65, h, 24), 
                new THREE.MeshStandardMaterial({ color, roughness: 0.55 }));
            peak.position.set(x, h / 2 - 0.1, z);
            peak.castShadow = true;
            scene.add(peak);
        };
        [[-3.5, -2.8, 0.95, '#56855e'], [3.2, -2.2, 1.05, '#4d7a5a'], [-2.2, 3.5, 0.85, '#618b64'],
         [3.8, 1.8, 0.9, '#528356'], [-4.2, 1.2, 0.88, '#4b784f'], [1.5, 4.2, 0.75, '#6e9a6a']].forEach(p => addPeak(p[0], p[1], p[2], p[3]));

        // 云雾粒子
        const cloudParticles = [];
        for (let i = 0; i < 200; i++) {
            const particle = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6), 
                new THREE.MeshStandardMaterial({ color: 0xece3bc, transparent: true, opacity: 0.25 }));
            particle.position.set((Math.random() - 0.5) * 24, Math.random() * 2.8 + 1.2, (Math.random() - 0.5) * 26);
            scene.add(particle);
            cloudParticles.push(particle);
        }

        // --- 小汽车 (朱红漆色，古意盎然)---
        const car = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.38, 1.7), 
            new THREE.MeshStandardMaterial({ color: 0xc4552a, roughness: 0.35, metalness: 0.5 }));
        body.position.y = 0.18;
        body.castShadow = true;
        car.add(body);
        
        const roof = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.26, 1.05), 
            new THREE.MeshStandardMaterial({ color: 0x9c7642, roughness: 0.5 }));
        roof.position.y = 0.48;
        car.add(roof);
        
        const glass = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.16, 0.5), 
            new THREE.MeshStandardMaterial({ color: 0x7aadcc, metalness: 0.8, transparent: true, opacity: 0.6 }));
        glass.position.set(0, 0.58, 0.48);
        car.add(glass);
        
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x2a2418 });
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 16);
        [[-0.55, 0.08, 0.68], [0.55, 0.08, 0.68], [-0.55, 0.08, -0.7], [0.55, 0.08, -0.7]].forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            car.add(wheel);
        });
        scene.add(car);

        // --- 行驶路径 (蜿蜒山道，尽览江山)---
        const points = [
            [-4.8, -3.2], [-3.2, -1.8], [-1.5, -0.2], [0, 1.0], [1.4, 1.7], 
            [2.8, 1.9], [4.0, 1.3], [4.8, 0], [4.2, -1.5], [2.5, -2.2], 
            [0.5, -1.8], [-1.2, -0.8], [-2.8, 0.2], [-4.0, 1.2], [-3.2, 2.3],
            [-1.2, 2.8], [1.0, 2.9], [2.8, 2.2], [3.5, 0.8], [2.0, -0.5]
        ];
        const curvePoints = points.map(p => new THREE.Vector3(p[0], 0, p[1]));
        const curve = new THREE.CatmullRomCurve3(curvePoints);
        curve.curveType = 'centripetal';
        curve.closed = true;
        
        // 显示路径金线
        const lineGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(200));
        const lineMat = new THREE.LineBasicMaterial({ color: 0xdbb468, transparent: true, opacity: 0.35 });
        const pathLine = new THREE.Line(lineGeo, lineMat);
        scene.add(pathLine);
        
        // 地形高度采样
        function getY(x, z) {
            let y = 0;
            y += Math.max(0, 1.3 - Math.hypot(x - 1.2, z - 1.8) / 2.2) * 1.2;
            y += Math.max(0, 1.0 - Math.hypot(x + 2.5, z - 0.5) / 2.4) * 1.0;
            y += Math.max(0, 0.9 - Math.hypot(x - 2, z + 2) / 2.3) * 0.9;
            y += Math.max(0, 0.7 - Math.hypot(x + 1, z + 3) / 2.5) * 0.8;
            y += Math.sin(x * 0.6) * Math.cos(z * 0.5) * 0.35;
            y += Math.sin(x * 1.4) * Math.sin(z * 1.3) * 0.2;
            return Math.max(0.05, y);
        }
        
        let t = 0;
        const speed = 0.002;
        let wheelRot = 0;
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            t += speed;
            if (t >= 1) t -= 1;
            
            const pos = curve.getPoint(t);
            const tangent = curve.getTangent(t).normalize();
            const terrainY = getY(pos.x, pos.z);
            
            car.position.set(pos.x, terrainY + 0.12, pos.z);
            car.rotation.y = Math.atan2(tangent.x, tangent.z);
            car.position.y += Math.sin(Date.now() * 0.015) * 0.005;
            
            // 车轮转动
            wheelRot += 0.12;
            car.children.forEach(child => {
                if (child.geometry && child.geometry.type === 'CylinderGeometry') {
                    child.rotation.x = wheelRot;
                }
            });
            
            // 动态光源跟随汽车
            fillLight.position.set(pos.x, terrainY + 0.6, pos.z);
            
            // 云雾飘移
            cloudParticles.forEach((p, i) => {
                p.position.x += Math.sin(Date.now() * 0.0005 + i) * 0.001;
                p.position.z += Math.cos(Date.now() * 0.0006 + i) * 0.001;
            });
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('%c🚗 千里江山图 · 青绿行 | 小汽车漫游宋代山水', 'color: #8bae6e; font-size: 14px');
    </script>
</body>
</html>
